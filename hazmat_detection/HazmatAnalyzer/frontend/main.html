<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HazardScan</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:     #070b10;
    --panel:  #0c1219;
    --border: #1a2535;
    --accent: #00d4ff;
    --text:   #dce8f0;
    --muted:  #4a6070;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Exo 2', sans-serif;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    zoom: 0.9;
  }

  /* HEADER */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 24px;
    height: 52px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    background: var(--panel);
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .brand-icon {
    width: 28px; height: 28px;
    border: 2px solid var(--accent);
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; color: var(--accent);
    box-shadow: 0 0 10px rgba(0,212,255,0.25);
  }

  .brand-name {
    font-family: 'Rajdhani', sans-serif;
    font-size: 1.3rem; font-weight: 700;
    letter-spacing: 3px; text-transform: uppercase;
    color: var(--accent);
  }

  .brand-name span { color: var(--text); }

  .live-badge {
    display: flex; align-items: center; gap: 6px;
    padding: 4px 12px;
    border: 1px solid var(--border); border-radius: 4px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.62rem; letter-spacing: 2px; color: var(--muted);
  }

  .live-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--muted); transition: all 0.3s;
  }
  .live-dot.on { background: #00e599; box-shadow: 0 0 6px #00e599; animation: blink 2s infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.4} }

  /* WORKSPACE */
  .workspace {
    flex: 1;
    display: grid;
    grid-template-columns: 1fr 1fr;
    min-height: 0;
  }

  /* CAMERA */
  .camera-section {
  position: relative;
  background: #000;
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  gap: 10px;
  padding: 10px;
  overflow-y: auto;
}

.cam-box {
  position: relative;
  height: 42vh;
  overflow: hidden;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: black;
}

.cam-box video {
  width: 100%;
  height: 100%;
  object-fit: cover;
}
  .section-tag {
    position: absolute; top: 14px; left: 14px; z-index: 10;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.58rem; letter-spacing: 3px; text-transform: uppercase;
    color: var(--accent);
    background: rgba(7,11,16,0.85);
    padding: 4px 10px;
    border: 1px solid rgba(0,212,255,0.2); border-radius: 3px;
    backdrop-filter: blur(4px);
  }

  #video1,
  #video2 {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
    background: black;
  }

  .overlay { position: absolute; inset: 0; pointer-events: none; }

  .scanline {
    position: absolute; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    box-shadow: 0 0 8px var(--accent); opacity: 0;
    animation: scanMove 4s ease-in-out infinite;
  }
  @keyframes scanMove { 0%{top:10%;opacity:0} 8%{opacity:0.6} 92%{opacity:0.6} 100%{top:90%;opacity:0} }

  .fc { position: absolute; width: 26px; height: 26px; border-color: rgba(0,212,255,0.4); border-style: solid; }
  .fc.tl { top:46px; left:12px; border-width:2px 0 0 2px; }
  .fc.tr { top:46px; right:12px; border-width:2px 2px 0 0; }
  .fc.bl { bottom:56px; left:12px; border-width:0 0 2px 2px; }
  .fc.br { bottom:56px; right:12px; border-width:0 2px 2px 0; }

  .reticle {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%) rotate(45deg);
    width: 70px; height: 70px;
    border: 1.5px solid rgba(0,212,255,0.5);
    box-shadow: 0 0 12px rgba(0,212,255,0.2) inset;
  }

  .cam-placeholder {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 16px;
    background: var(--bg);
  }
  .cam-placeholder svg { opacity: 0.15; }
  .cam-placeholder p {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.7rem; color: var(--muted);
    letter-spacing: 1px; text-align: center; line-height: 1.8;
  }

  .cam-bar {
    position: absolute; bottom: 0; left: 0; right: 0;
    padding: 10px 14px; display: flex; gap: 8px;
    background: linear-gradient(0deg, rgba(7,11,16,0.95), transparent);
  }

  .btn {
    padding: 7px 16px; border-radius: 4px;
    border: 1px solid var(--border);
    background: rgba(12,18,25,0.9);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.65rem; letter-spacing: 1.5px; text-transform: uppercase;
    cursor: pointer; transition: all 0.18s; backdrop-filter: blur(6px);
  }
  .btn:hover { border-color: var(--accent); color: var(--accent); }
  .btn.primary { border-color: var(--accent); color: var(--accent); }
  .btn.primary:hover { background: rgba(0,212,255,0.12); box-shadow: 0 0 12px rgba(0,212,255,0.2); }
  .btn.hidden { display: none; }

  /* INFO PANEL */
  .info-section {
    background: var(--panel);
    display: flex; flex-direction: column;
    min-height: 0; overflow: hidden;
  }

  .class-hero {
    display: flex; align-items: stretch;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    min-height: 108px;
    transition: background 0.4s;
  }

  .class-diamond-wrap {
    display: flex; align-items: center; justify-content: center;
    padding: 16px 20px;
    border-right: 1px solid var(--border);
    flex-shrink: 0;
  }

  .diamond {
    width: 64px; height: 64px;
    transform: rotate(45deg);
    border: 2px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    transition: all 0.4s;
  }

  .diamond-inner { transform: rotate(-45deg); text-align: center; line-height: 1; }

  .diamond-num {
    font-family: 'Rajdhani', sans-serif;
    font-size: 1.6rem; font-weight: 700;
    display: block; transition: color 0.4s;
  }

  .diamond-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.4rem; letter-spacing: 1px;
    opacity: 0.6; display: block;
  }

  .class-meta {
    flex: 1; padding: 14px 16px;
    display: flex; flex-direction: column; justify-content: center; gap: 5px;
  }

  .class-number-tag {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.58rem; letter-spacing: 2px; color: var(--muted);
    text-transform: uppercase;
  }

  .class-name-big {
    font-family: 'Rajdhani', sans-serif;
    font-size: 1.2rem; font-weight: 700; letter-spacing: 1px;
    color: var(--text); line-height: 1.1;
  }

  .class-subtitle { font-size: 0.72rem; color: #7a9aaa; line-height: 1.4; }

  .signal-row { display: flex; align-items: center; gap: 8px; margin-top: 2px; }

  .signal-tag {
    padding: 2px 9px; border-radius: 3px;
    font-family: 'Rajdhani', sans-serif;
    font-size: 0.68rem; font-weight: 700; letter-spacing: 3px; text-transform: uppercase;
  }
  .signal-tag.danger  { background: rgba(255,59,59,0.15); border: 1px solid rgba(255,59,59,0.35); color: #ff5555; }
  .signal-tag.warning { background: rgba(255,200,0,0.12); border: 1px solid rgba(255,200,0,0.3);  color: #ffcc00; }

  .info-body {
    flex: 1; overflow-y: auto;
    padding: 14px 16px;
    display: flex; flex-direction: column; gap: 10px;
    scrollbar-width: thin; scrollbar-color: var(--border) transparent;
  }

  .empty {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 12px; opacity: 0.28; text-align: center; padding: 30px;
  }
  .empty-glyph { font-size: 2.8rem; }
  .empty p {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.68rem; color: var(--muted);
    letter-spacing: 1px; line-height: 1.8;
  }

  .info-block {
    border: 1px solid var(--border); border-radius: 6px; overflow: hidden;
    animation: fadeUp 0.3s ease-out both;
  }
  @keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

  .block-head {
    padding: 6px 12px;
    background: rgba(255,255,255,0.025);
    border-bottom: 1px solid var(--border);
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.56rem; letter-spacing: 2px;
    text-transform: uppercase; color: var(--muted);
    display: flex; align-items: center; gap: 6px;
  }

  .block-body { padding: 10px 12px; display: flex; flex-direction: column; gap: 7px; }

  .row { display: flex; gap: 10px; align-items: flex-start; }
  .row-val { font-size: 0.78rem; color: var(--text); line-height: 1.5; }

  .bullet-list { display: flex; flex-direction: column; gap: 5px; }

  .bullet-item {
    font-size: 0.76rem; color: var(--text); line-height: 1.45;
    padding-left: 14px; position: relative;
  }
  .bullet-item::before { content: '▸'; position: absolute; left: 0; font-size: 0.6rem; top: 2px; color: var(--muted); }
  .bullet-item.h-stmt::before { color: #cc5555; }
  .bullet-item.p-stmt::before { color: #4488bb; }
  .bullet-item.r-stmt::before { color: #ee9944; }

  .tag-row { display: flex; flex-wrap: wrap; gap: 5px; }
  .tag {
    padding: 3px 9px;
    border: 1px solid var(--border); border-radius: 3px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.58rem; color: var(--muted);
  }

  .chip-row { display: flex; flex-wrap: wrap; gap: 5px; }
  .chip {
    padding: 3px 9px;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border); border-radius: 10px;
    font-size: 0.7rem; color: #8aacbc;
  }

  footer {
    height: 34px; border-top: 1px solid var(--border);
    display: flex; align-items: center; padding: 0 22px; gap: 20px; flex-shrink: 0;
  }
  .foot {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.57rem; color: var(--muted); letter-spacing: 1px;
  }
  .foot::before { content: '// '; color: var(--border); }

  @media (max-width: 680px) {
    .workspace {
      flex: 1;
      display: grid;
      grid-template-columns: 42% 58%;
      min-height: 0;
      overflow: hidden;
    }
    .camera-section { border-right: none; border-bottom: 1px solid var(--border); }
  }
</style>
</head>
<body>

<header>
  <div class="brand">
    <div class="brand-icon">◈</div>
    <div class="brand-name">Hazard<span>Scan</span></div>
  </div>
  <div class="live-badge">
    <div class="live-dot" id="liveDot"></div>
    <span id="liveText">OFFLINE</span>
  </div>
</header>

<div class="workspace">

  <!-- LEFT: CAMERA -->
  <div class="camera-section">

  <!-- CAMERA 1 -->
  <div class="cam-box">

    <div class="section-tag">// LAPTOP CAMERA</div>

    <video id="video1" autoplay playsinline muted></video>

    <div class="overlay">
      <div class="scanline"></div>
    </div>

  </div>

  <!-- CAMERA 2 -->
  <div class="cam-box">

    <div class="section-tag">// CCTV CAMERA</div>

    <video id="video2" autoplay playsinline muted></video>

    <div class="overlay">
      <div class="scanline"></div>
    </div>

  </div>

  <div class="cam-bar">
    <button class="btn primary" onclick="startCameras()">Enable Cameras</button>
    <button class="btn" onclick="stopCameras()">Stop</button>
  </div>

</div>

  <!-- RIGHT: INFO -->
  <div class="info-section">

    <div class="class-hero" id="classHero">
      <div class="class-diamond-wrap">
        <div class="diamond" id="diamond">
          <div class="diamond-inner">
            <span class="diamond-num" id="diamondNum">—</span>
            <span class="diamond-label">CLASS</span>
          </div>
        </div>
      </div>
      <div class="class-meta">
        <div class="class-number-tag" id="classTag">// AWAITING DETECTION</div>
        <div class="class-name-big" id="className">No Hazard Detected</div>
        <div class="class-subtitle" id="classSub">Point camera at a GHS diamond placard</div>
        <div class="signal-row" id="signalRow" style="display:none">
          <span class="signal-tag" id="signalTag"></span>
        </div>
      </div>
    </div>

    <div class="info-body" id="infoBody">
      <div class="empty">
        <div class="empty-glyph">◇</div>
        <p>Detection output will<br>appear here once a<br>placard is identified.</p>
      </div>
    </div>

  </div>
</div>

<footer>
  <span class="foot">GHS Placards Classes 1–9</span>
  <span class="foot">UN Model Regulations</span>
  <span class="foot" id="footRes">—</span>
</footer>

<script>
  // ── Camera ──────────────────────────────────────────────
  let stream1 = null;
  let stream2 = null;
  const canvas = document.createElement('canvas');
  const ctx = canvas.getContext('2d');
  let detectionLoop = null;
  let detecting = false;
  
  
async function startCameras() {

  try {

    // Ask permission FIRST
    await navigator.mediaDevices.getUserMedia({ video: true });

    // Get all video devices
    const devices = await navigator.mediaDevices.enumerateDevices();

    const cams = devices.filter(d => d.kind === 'videoinput');

    console.log(cams);

    // Find laptop camera
    const laptopCam = cams.find(c =>
      c.label.includes("HP TrueVision")
    );

    // Find USB camera
    const usbCam = cams.find(c =>
      c.label.includes("USB")
    );

    console.log('Laptop Cam:', laptopCam);
    console.log('USB Cam:', usbCam);

    // ─────────────────────────────────────
    // Laptop Camera
    // ─────────────────────────────────────
    if (laptopCam) {

      stream1 = await navigator.mediaDevices.getUserMedia({
        video: {
          deviceId: {
            exact: laptopCam.deviceId
          },
          width: { ideal: 1280 },
          height: { ideal: 720 }
        }
      });

      document.getElementById('video1').srcObject = stream1;
    }

    // ─────────────────────────────────────
    // USB Camera
    // ─────────────────────────────────────
    if (usbCam) {

      stream2 = await navigator.mediaDevices.getUserMedia({
        video: {
          deviceId: {
            exact: usbCam.deviceId
          },
          width: { ideal: 1280 },
          height: { ideal: 720 }
        }
      });

      document.getElementById('video2').srcObject = stream2;
    }

    setLive(true);

    // Start ML detection loop
    detectionLoop = setInterval(() => {

      detectHazardFromVideo('video1');
      detectHazardFromVideo('video2');

    }, 1500);

  } catch(err) {

    console.error(err);
    alert(err.message);

  }
}


function stopCameras() {

  if (stream1) {
    stream1.getTracks().forEach(t => t.stop());
  }

  if (stream2) {
    stream2.getTracks().forEach(t => t.stop());
  }

  clearInterval(detectionLoop);

  setLive(false);
}
async function detectHazardFromVideo(videoId) {

  const video = document.getElementById(videoId);

  if (!video || !video.videoWidth) return;

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  ctx.drawImage(video, 0, 0);

  canvas.toBlob(async (blob) => {

    const formData = new FormData();
    formData.append('image', blob, 'frame.jpg');

    try {

      const response = await fetch('http://127.0.0.1:8000/predict', {
        method: 'POST',
        body: formData
      });

      const data = await response.json();

      console.log(videoId, data);

      if (data.detected && data.class) {

        displayClass(data.class);

      }

    } catch(err) {

      console.error(err);

    }

  }, 'image/jpeg', 0.8);
}

  // ── Main display function ────────────────────────────────
  // Your model calls: displayClass(classNumber)   e.g. displayClass(4)
  // Optionally:       displayClass(4, "4.2 — Spontaneously combustible")
  function displayClass(classNum, detectedDivision) {
    const d = GHS[classNum];
    if (!d) return;
    const c = d.color;

    // Diamond
    const diam = document.getElementById('diamond');
    diam.style.borderColor = c;
    diam.style.background = c + '1a';
    diam.style.boxShadow = `0 0 22px ${c}33, 0 0 8px ${c}22 inset`;
    document.getElementById('diamondNum').textContent = classNum;
    document.getElementById('diamondNum').style.color = c;

    // Hero
    document.getElementById('classHero').style.background = c + '09';
    document.getElementById('classTag').textContent = `// CLASS ${classNum} DETECTED`;
    document.getElementById('classTag').style.color = c;
    document.getElementById('className').textContent = d.name;
    document.getElementById('classSub').textContent = detectedDivision || d.description.slice(0, 80) + '…';

    const sigRow = document.getElementById('signalRow');
    const sigTag = document.getElementById('signalTag');
    sigRow.style.display = 'flex';
    sigTag.textContent = d.signal;
    sigTag.className = 'signal-tag ' + (d.signal === 'DANGER' ? 'danger' : 'warning');

    // Body
    const body = document.getElementById('infoBody');
    body.innerHTML = '';

    blk(body, '📋', 'Description', `<div class="row"><span class="row-val">${d.description}</span></div>`, 0);

    blk(body, '◈', 'Divisions & Sub-Classes',
      `<div class="bullet-list">${d.divisions.map(x => `<div class="bullet-item">${x}</div>`).join('')}</div>`, 1);

    blk(body, '⚠', 'Hazard Statements (H-codes)',
      `<div class="bullet-list">${d.hazards.map(x => `<div class="bullet-item h-stmt">${x}</div>`).join('')}</div>`, 2);

    blk(body, '🛡', 'Precautionary Measures (P-codes)',
      `<div class="bullet-list">${d.precautions.map(x => `<div class="bullet-item p-stmt">${x}</div>`).join('')}</div>`, 3);

    blk(body, '🚨', 'Emergency Response',
      `<div class="bullet-list">${d.response.map(x => `<div class="bullet-item r-stmt">${x}</div>`).join('')}</div>`, 4);

    blk(body, '🥽', 'Required PPE',
      `<div class="tag-row">${d.ppe.map(p => `<span class="tag">${p}</span>`).join('')}</div>`, 5);

    blk(body, '🏭', 'Storage Requirements',
      `<div class="row"><span class="row-val">${d.storage}</span></div>`, 6);

    blk(body, '🧪', 'Common Examples of This Class',
      `<div class="chip-row">${d.examples.map(e => `<span class="chip">${e}</span>`).join('')}</div>`, 7);
  }

  function blk(parent, icon, title, html, delay) {
    const el = document.createElement('div');
    el.className = 'info-block';
    el.style.animationDelay = (delay * 0.07) + 's';
    el.innerHTML = `<div class="block-head"><span>${icon}</span>${title}</div><div class="block-body">${html}</div>`;
    parent.appendChild(el);
  }

  // Keyboard demo: press 1–9 to preview any class
  document.addEventListener('keydown', e => {
    const n = parseInt(e.key);
    if (n >= 1 && n <= 9) displayClass(n);
  });
</script>
